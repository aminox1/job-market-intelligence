version: "3.9"

services:
  app:
    build: .
    container_name: job-market-intelligence
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # Persistance de la base SQLite
      - ./models:/app/models      # Modèles ML sauvegardés
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
  models:
